<!-- PRODUCT CARD -->
 <body>
<div class="container" style="padding:80px 0;">

    <div class="row align-items-center">

        <div class="col-lg-6">

            <img id="detail-image"
                 src=""
                 alt="Product"

                 style="
                    width:100%;
                    height:500px;
                    object-fit:cover;
                    border-radius:12px;
                    background:#f5f5f5;
                 ">

        </div>

        <div class="col-lg-6">

            <div style="padding-left:40px;">

                <h1 id="detail-name"

                    style="
                        font-size:32px;
                        font-weight:600;
                        line-height:42px;
                        margin-bottom:20px;
                    ">
                </h1>

                <div id="detail-price"

                     style="
                        font-size:28px;
                        font-weight:700;
                        color:#0d6efd;
                        margin-bottom:25px;
                     ">
                </div>

                <p style="
                    font-size:15px;
                    line-height:28px;
                    color:#666;
                    margin-bottom:30px;
                ">

                    Premium quality product with modern design,
                    advanced performance and comfortable usage experience.

                </p>

                <a href="#shoppingCart"
                   data-bs-toggle="offcanvas"

                   class="tf-btn btn-fill"

                   id="detail-add-cart"

                   style="
                        height:52px;
                        padding:0 35px;
                        border-radius:8px;
                        font-size:16px;
                        font-weight:600;
                        display:inline-flex;
                        align-items:center;
                        justify-content:center;
                   ">

                    Add To Cart

                </a>

            </div>

        </div>

    </div>

</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const productButtons =
        document.querySelectorAll(".view-product-btn");

    productButtons.forEach(button => {

        button.addEventListener("click", function () {

            const product = {

                name: this.dataset.name,

                price: this.dataset.price,

                image: this.dataset.image

            };

            localStorage.setItem(
                "selectedProduct",
                JSON.stringify(product)
            );
        });

    });

});
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get saved product
    const product =
        JSON.parse(localStorage.getItem("selectedProduct"));

    // Check product exists
    if(product){

        // Show image
        document.getElementById("detail-image").setAttribute(
    "src",
    product.image
);

        // Show name
        document.getElementById("detail-name").innerText =
            product.name;

        // Show price
        document.getElementById("detail-price").innerText =
            "Rs." + product.price;

        // Add to cart button
        const addCartBtn =
            document.getElementById("detail-add-cart");

        addCartBtn.addEventListener("click", function () {

            let cart =
                JSON.parse(localStorage.getItem("cartItems")) || [];

            const existingProduct = cart.find(
                item => item.name === product.name
            );

            if(existingProduct){

                existingProduct.quantity += 1;

            }else{

                cart.push({
                    name: product.name,
                    price: 1000,
                    image: product.image,
                    quantity: 1
                });
            }

            localStorage.setItem(
                "cartItems",
                JSON.stringify(cart)
            );

            alert("Product added to cart!");
        });

    }

});
</script>
